name: Build Peachify CloudStream Extension

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Peachify Extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'adopt'
          cache: gradle

      - name: Make Gradlew executable
        run: chmod +x Peachify/gradlew

      - name: Build Peachify
        working-directory: ./Peachify
        run: ./gradlew assembleDebug

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: peachify-extension
          path: Peachify/build/outputs/apk/debug/*.apk
          retention-days: 30
